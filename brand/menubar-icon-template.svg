<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22" role="img" aria-label="Burrow menu bar icon template">
  <!--
    Menu bar icon template for macOS.
    Export at 1x (22x22), 2x (44x44), 3x (66x66) for Assets.xcassets.

    Two variants:
      active   — tunnel live: orange arch + acid pulse dot
      template — grayscale for NSImage templateImage rendering;
                 macOS applies system tint automatically

    To use as template image in Xcode:
      1. Export this file at each scale
      2. In Assets.xcassets, set Render As = Template Image
      3. NSStatusItem will tint automatically for light/dark menu bar
  -->

  <!-- ACTIVE STATE: tunnel live, shown via TunnelState.connected -->
  <g id="active">
    <!-- Horizon line: orange #FF6A1A -->
    <line x1="2" y1="16" x2="20" y2="16" stroke="#FF6A1A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Arch: half-circle above horizon -->
    <path d="M4 16 A7 7 0 0 1 18 16" fill="none" stroke="#FF6A1A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pulse dot: acid #C8FF1A -->
    <circle cx="11" cy="9.5" r="1.5" fill="#C8FF1A"/>
  </g>

  <!-- TEMPLATE VARIANT: grayscale, for NSImage templateImage -->
  <!-- Duplicate active group with black strokes; hide this layer before exporting active variant -->
  <g id="template-variant" display="none">
    <line x1="2" y1="16" x2="20" y2="16" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M4 16 A7 7 0 0 1 18 16" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="11" cy="9.5" r="1.5" fill="black"/>
  </g>
</svg>
